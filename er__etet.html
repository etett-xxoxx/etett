<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ER:BS Profile Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* =========================================
           페이퍼로지(Paperlogy) 웹폰트 연동
           ========================================= */
        @import url('https://fastly.jsdelivr.net/gh/projectnoonnu/2403-2@1.0/Paperlogy-All.woff2');

        /* 기본 레이아웃 및 테마 (인게임 다크 모드 스타일) */
        body {
            font-family: 'Paperlogy', sans-serif;
            background: linear-gradient(135deg, #121216 0%, #1a1a24 100%);
            color: #e2e4e9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
        }

        /* 헤더 디자인 */
        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin: 0 0 8px 0;
            background: linear-gradient(90deg, #ff9800, #ff5722);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(255, 152, 0, 0.2);
        }

        header p {
            font-size: 14px;
            color: #989aa6;
            margin: 0;
            font-weight: 400;
        }

        /* 컨트롤 패널 UI (글로벌 트렌드에 맞춘 플로팅 바 스펙) */
        .control-panel {
            background: rgba(34, 34, 46, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            padding: 12px 24px;
            border-radius: 14px;
            display: flex;
            gap: 14px;
            align-items: center;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .control-btn {
            font-family: 'Paperlogy', sans-serif;
            font-weight: 600;
            font-size: 14px;
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bg-btn {
            background: #2f3142;
            color: #e2e4e9;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .bg-btn:hover {
            background: #3d3f54;
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        .download-btn {
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.3);
        }
        .download-btn:hover {
            background: linear-gradient(135deg, #ffa726 0%, #fb8c00 100%);
            box-shadow: 0 6px 20px rgba(255, 152, 0, 0.4);
            transform: translateY(-1px);
        }

        /* =========================================
           워크스페이스 캔버스 디자인 
           ========================================= */
        .canvas-container {
            position: relative;
            padding: 10px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        #capture-area {
            position: relative;
            width: 800px;
            height: 450px;
            background-image: url('background.png'); /* 기본 파일 매칭 */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #1a1a24;
            border-radius: 8px;
            overflow: hidden;
        }

        /* =========================================
           캐릭터 이미지 슬롯 공통 스펙 
           ========================================= */
        .image-slot {
            position: absolute;
            background-color: rgba(0, 0, 0, 0.05);
            overflow: hidden;
            cursor: pointer;
            border: 1px dashed rgba(255, 255, 255, 0.25);
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        .image-slot:hover {
            border-color: #ff9800;
            background-color: rgba(255, 152, 0, 0.05);
        }

        .image-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        /* 호버 시 업로드 안내 UI 가이드 디자인 */
        .image-slot .slot-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .image-slot:hover .slot-overlay { opacity: 1; }
        
        .slot-overlay span {
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            background: rgba(255, 152, 0, 0.85);
            padding: 4px 8px;
            border-radius: 4px;
            backdrop-filter: blur(4px);
        }

        .hide-input { display: none; }
        .center-circle { border-radius: 50%; }

        /* 캐릭터 슬롯 개별 좌표 */
        .main-char-1 { top: 22.5%; left: 5.5%; width: 14.5%; height: 33.5%; border-radius: 4px; }
        .main-char-2 { top: 22.5%; left: 22.5%; width: 14.5%; height: 33.5%; border-radius: 4px; }
        .profile-char { top: 24.8%; left: 40.5%; width: 19.2%; height: 34.2%; }
        .favorite-char-1 { top: 62%; left: 63.5%; width: 14.5%; height: 33.5%; border-radius: 4px; }
        .favorite-char-2 { top: 62%; left: 80.5%; width: 14.5%; height: 33.5%; border-radius: 4px; }

        /* =========================================
           텍스트 인풋 디자인 스펙
           ========================================= */
        .transparent-input {
            position: absolute;
            background: transparent;
            border: none;
            outline: none;
            color: #1a1b20; /* 원본 텍스트 색감 조율 */
            font-family: 'Paperlogy', sans-serif;
            font-weight: 600;
            font-size: 13.5px;
            padding: 2px 4px;
            box-sizing: border-box;
            transition: background-color 0.15s ease;
        }
        
        /* 작성 시 유저 편의를 위해 포커스될 때 미세한 표시등 부여 (다운로드시에는 자동 제거됨) */
        .transparent-input:focus {
            background-color: rgba(255, 152, 0, 0.08);
            border-radius: 4px;
        }

        textarea.transparent-input {
            resize: none;
            overflow: hidden;
            line-height: 1.45;
            font-weight: 500;
        }

        .transparent-input::placeholder {
            color: rgba(0, 0, 0, 0.3);
            font-weight: 400;
            font-size: 12px;
        }

        /* 텍스트 컴포넌트 절대 좌표 구조 */
        /* 인게임 세션 (일반/랭크/코발트/내전 최적화) */
        .pos-ingame-mode { top: 68.2%; left: 13.5%; width: 15.5%; }
        .pos-ingame-name { top: 74.8%; left: 13.5%; width: 15.5%; font-weight: 700; color: #000; }
        .pos-ingame-discord { top: 81.3%; left: 13.5%; width: 15.5%; }
        .pos-ingame-tier { top: 88.0%; left: 13.5%; width: 15.5%; font-weight: 700; }

        /* 메인 명찰 및 정보 피드 */
        .pos-center-name { top: 22.0%; left: 43.0%; width: 14.0%; text-align: center; color: #ffffff; font-weight: 700; font-size: 14.5px; }
        .pos-gender-age { top: 61.8%; left: 45.0%; width: 13.0%; text-align: center; }
        .pos-free-text { top: 79.5%; left: 37.5%; width: 25.0%; height: 13.5%; font-size: 12.5px; }

        /* 소통 및 트윗 성향 데이터 */
        .pos-type-tweet { top: 28.3%; left: 76.5%; width: 18.0%; }
        .pos-type-block { top: 35.3%; left: 76.5%; width: 18.0%; }
        .pos-type-time { top: 42.3%; left: 76.5%; width: 18.0%; }
    </style>
</head>
<body>

    <header>
        <h1>ETERNAL RETURN PROFILE GENERATOR</h1>
        <p>원하는 테마 배경과 캐릭터 이미지를 올려 나만의 트친소 카드를 완성해 보세요.</p>
    </header>
    
    <div class="control-panel">
        <label for="bg-upload" class="control-btn bg-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            배경 폼 등록
        </label>
        <input type="file" id="bg-upload" accept="image/*" class="hide-input">
        
        <button class="control-btn download-btn" onclick="downloadImage()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            이미지 다운로드
        </button>
    </div>

    <div class="canvas-container">
        <div id="capture-area">
            
            <div class="image-slot main-char-1">
                <img id="img-main-1" src="#" alt="주캐릭터 1">
                <div class="slot-overlay"><span>주캐릭터 1</span></div>
                <input type="file" id="upload-main-1" accept="image/*" class="hide-input" onchange="previewImg(this, 'img-main-1')">
            </div>
            <div class="image-slot main-char-2">
                <img id="img-main-2" src="#" alt="주캐릭터 2">
                <div class="slot-overlay"><span>주캐릭터 2</span></div>
                <input type="file" id="upload-main-2" accept="image/*" class="hide-input" onchange="previewImg(this, 'img-main-2')">
            </div>
            <div class="image-slot profile-char center-circle">
                <img id="img-profile" src="#" alt="프로필">
                <div class="slot-overlay"><span style="border-radius: 50%;">메인 프로필</span></div>
                <input type="file" id="upload-profile" accept="image/*" class="hide-input" onchange="previewImg(this, 'img-profile')">
            </div>
            <div class="image-slot favorite-char-1">
                <img id="img-fav-1" src="#" alt="애정캐릭터 1">
                <div class="slot-overlay"><span>애정캐릭터 1</span></div>
                <input type="file" id="upload-fav-1" accept="image/*" class="hide-input" onchange="previewImg(this, 'img-fav-1')">
            </div>
            <div class="image-slot favorite-char-2">
                <img id="img-fav-2" src="#" alt="애정캐릭터 2">
                <div class="slot-overlay"><span>애정캐릭터 2</span></div>
                <input type="file" id="upload-fav-2" accept="image/*" class="hide-input" onchange="previewImg(this, 'img-fav-2')">
            </div>

            <input type="text" class="transparent-input pos-ingame-mode" placeholder="일반 / 랭크 / 코발트 / 내전">
            <input type="text" class="transparent-input pos-ingame-name" placeholder="인게임 닉네임">
            <input type="text" class="transparent-input pos-ingame-discord" placeholder="듣기 / 말하기 / 전부 / 사용X">
            <input type="text" class="transparent-input pos-ingame-tier" placeholder="현재 티어">

            <input type="text" class="transparent-input pos-center-name" placeholder="트위터 핸들/닉네임">
            <input type="text" class="transparent-input pos-gender-age" placeholder="성별 / 나이">
            <textarea class="transparent-input pos-free-text" placeholder="여기에 자기소개나 플레이 스타일, 연성 성향 글을 편하게 입력하세요."></textarea>

            <input type="text" class="transparent-input pos-type-tweet" placeholder="연성 / 소비 / 흔적 / 일상">
            <input type="text" class="transparent-input pos-type-block" placeholder="블락 / 블언블 / 언팔">
            <input type="text" class="transparent-input pos-type-time" placeholder="주요 접속 타임라인">

        </div>
    </div>

    <script>
        // 배경 리더 컴포넌트 핸들러
        document.getElementById('bg-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('capture-area').style.backgroundImage = `url('${event.target.result}')`;
                };
                reader.readAsDataURL(file);
            }
        });

        // 썸네일 프리뷰 파이프라인
        function previewImg(input, imgId) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById(imgId);
                    img.src = e.target.result;
                    img.style.display = 'block';
                    
                    // 이미지가 채워지면 가이드 텍스트 가리기
                    input.closest('.image-slot').querySelector('.slot-overlay').style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        }

        // 이벤트 위임을 활용한 파일 인풋 트리거 모듈
        document.querySelectorAll('.image-slot').forEach(slot => {
            slot.addEventListener('click', function() {
                this.querySelector('input[type="file"]').click();
            });
        });

        // 캔버스 내보내기 마스터 모듈
        function downloadImage() {
            const captureArea = document.getElementById('capture-area');
            const slots = document.querySelectorAll('.image-slot');
            
            // 캡처 최적화 작업을 위한 가이드라인 일시 은닉
            slots.forEach(slot => slot.style.border = 'none');

            html2canvas(captureArea, {
                scale: 2, // 선명도를 위한 2배 스케일업 렌더링 스펙 유지
                useCORS: true,
                backgroundColor: null,
                logging: false
            }).then(canvas => {
                // 캡처 완료 후 가이드라인 복구
                slots.forEach(slot => slot.style.border = '1px dashed rgba(255, 255, 255, 0.25)');

                const imageUrl = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.href = imageUrl;
                link.download = 'eternal_return_card.png';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }).catch(err => {
                console.error("Render fail:", err);
                alert("이미지 렌더링에 실패했습니다.");
                slots.forEach(slot => slot.style.border = '1px dashed rgba(255, 255, 255, 0.25)');
            });
        }
    </script>
</body>
</html>
