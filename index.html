<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ER:BS Profile Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fastly.jsdelivr.net/gh/projectnoonnu/2403-2@1.0/Paperlogy-All.woff2');

        body {
            font-family: 'Paperlogy', sans-serif;
            background: linear-gradient(135deg, #121216 0%, #1a1a24 100%);
            color: #e2e4e9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
        }

        header { text-align: center; margin-bottom: 30px; }
        h1 {
            font-size: 28px;
            font-weight: 800;
            margin: 0 0 8px 0;
            background: linear-gradient(90deg, #ff9800, #ff5722);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header p { font-size: 14px; color: #989aa6; margin: 0; }

        .control-panel {
            background: rgba(34, 34, 46, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            padding: 12px 24px;
            border-radius: 14px;
            display: flex;
            gap: 14px;
            align-items: center;
            margin-bottom: 30px;
        }

        .control-btn {
            font-family: 'Paperlogy', sans-serif;
            font-weight: 600;
            font-size: 14px;
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .bg-btn { background: #2f3142; color: #e2e4e9; border: 1px solid rgba(255, 255, 255, 0.1); }
        .bg-btn:hover { background: #3d3f54; }
        .download-btn { background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%); color: white; }
        .download-btn:hover { background: linear-gradient(135deg, #ffa726 0%, #fb8c00 100%); }

        .canvas-container {
            position: relative;
            padding: 10px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #capture-area {
            position: relative;
            width: 800px;
            height: 450px;
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #1a1a24;
            border-radius: 8px;
            overflow: hidden;
        }

        /* 캐릭터 이미지 슬롯 */
        .image-slot {
            position: absolute;
            background-color: rgba(0, 0, 0, 0.05);
            overflow: hidden;
            cursor: pointer;
            border: 1px dashed rgba(255, 255, 255, 0.25);
            box-sizing: border-box;
        }
        .image-slot img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .slot-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .image-slot:hover .slot-overlay { opacity: 1; }
        .slot-overlay span {
            color: #fff; font-size: 11px; font-weight: 600;
            background: rgba(255, 152, 0, 0.85); padding: 4px 8px; border-radius: 4px;
        }

        .hide-input { display: none; }
        .center-circle { border-radius: 50%; }

        /* 슬롯 좌표 설정 */
        .main-char-1 { top: 22.5%; left: 5.5%; width: 14.5%; height: 33.5%; border-radius: 4px; }
        .main-char-2 { top: 22.5%; left: 22.5%; width: 14.5%; height: 33.5%; border-radius: 4px; }
        .profile-char { top: 24.8%; left: 40.5%; width: 19.2%; height: 34.2%; }
        .favorite-char-1 { top: 62%; left: 63.5%; width: 14.5%; height: 33.5%; border-radius: 4px; }
        .favorite-char-2 { top: 62%; left: 80.5%; width: 14.5%; height: 33.5%; border-radius: 4px; }

        /* =========================================
           인풋 래퍼 및 가독성 최적화 스타일 (그림자 및 테두리 효과)
           ========================================= */
        .input-wrapper {
            position: absolute;
            box-sizing: border-box;
            display: flex;
            align-items: center;
        }

        /* 폰트 기본 서식 및 찐한 그림자/테두리(Text-stroke 대용) 효과 적용 */
        .transparent-input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            font-family: 'Paperlogy', sans-serif;
            font-weight: 700;
            font-size: 13.5px;
            padding: 2px 4px;
            box-sizing: border-box;
            color: #ffffff;
            /* 글씨 겉에 얇고 선명한 검은색 외곽선 + 부드러운 그림자 조합으로 가독성 극대화 */
            text-shadow: 
                -1.5px -1.5px 0 #000,  
                 1.5px -1.5px 0 #000,
                -1.5px  1.5px 0 #000,
                 1.5px  1.5px 0 #000,
                 0px 2px 5px rgba(0, 0, 0, 0.9);
        }
        .transparent-input:focus {
            background-color: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }
        .transparent-input::placeholder { 
            color: rgba(255, 255, 255, 0.6); 
            font-weight: 500; 
            font-size: 12px; 
            text-shadow: 0px 1px 3px rgba(0,0,0,0.8);
        }

        /* 캡처용 미러링 디브에도 동일한 가독성 효과 부여 */
        .capture-text-mirror {
            display: none;
            width: 100%;
            font-family: 'Paperlogy', sans-serif;
            font-weight: 700;
            font-size: 13.5px;
            padding: 2px 4px;
            white-space: pre-wrap;
            word-break: break-all;
            box-sizing: border-box;
            color: #ffffff;
            text-shadow: 
                -1.5px -1.5px 0 #000,  
                 1.5px -1.5px 0 #000,
                -1.5px  1.5px 0 #000,
                 1.5px  1.5px 0 #000,
                 0px 2px 5px rgba(0, 0, 0, 0.9);
        }

        /* 다운로드 시 노드 스위칭 */
        .capturing .transparent-input { display: none !important; }
        .capturing .capture-text-mirror { display: block !important; }

        /* 각 영역별 상세 위치 설정 */
        .pos-ingame-mode { top: 68.2%; left: 13.5%; width: 15.5%; }
        .pos-ingame-name { top: 74.8%; left: 13.5%; width: 15.5%; }
        .pos-ingame-discord { top: 81.3%; left: 13.5%; width: 15.5%; }
        .pos-ingame-tier { top: 88.0%; left: 13.5%; width: 15.5%; }

        /* 중앙 상단 닉네임 구역 */
        .pos-center-name { top: 22.0%; left: 43.0%; width: 14.0%; justify-content: center; }
        .pos-center-name .transparent-input, .pos-center-name .capture-text-mirror { 
            text-align: center; 
            font-size: 15px; 
        }
        
        .pos-gender-age { top: 61.8%; left: 45.0%; width: 13.0%; justify-content: center; }
        .pos-gender-age .transparent-input, .pos-gender-age .capture-text-mirror { text-align: center; }
        
        /* 한마디/소개글 구역 (Textarea 세로 정렬 대응) */
        .pos-free-text { top: 79.5%; left: 37.5%; width: 25.0%; height: 13.5%; align-items: flex-start; }
        .pos-free-text .transparent-input, .pos-free-text .capture-text-mirror { 
            font-weight: 600; 
            font-size: 12.5px; 
            text-align: left; 
            resize: none;
        }

        .pos-type-tweet { top: 28.3%; left: 76.5%; width: 18.0%; }
        .pos-type-block { top: 35.3%; left: 76.5%; width: 18.0%; }
        .pos-type-time { top: 42.3%; left: 76.5%; width: 18.0%; }
    </style>
</head>
<body>

    <header>
        <h1>ETERNAL RETURN PROFILE GENERATOR</h1>
        <p>원하는 테마 배경과 캐릭터 이미지를 올려 나만의 트친소 카드를 완성해 보세요.</p>
    </header>
    
    <div class="control-panel">
        <label for="bg-upload" class="control-btn bg-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            배경 폼 등록
        </label>
        <input type="file" id="bg-upload" accept="image/*" class="hide-input">
        
        <button class="control-btn download-btn" onclick="downloadImage()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            이미지 다운로드
        </button>
    </div>

    <div class="canvas-container">
        <div id="capture-area">
            
            <div class="image-slot main-char-1">
                <img id="img-main-1" src="#" alt="주캐릭터 1">
                <div class="slot-overlay"><span>주캐릭터 1</span></div>
                <input type="file" id="upload-main-1" accept="image/*" class="hide-input" onchange="previewImg(this, 'img-main-1')">
            </div>
            <div class="image-slot main-char-2">
                <img id="img-main-2" src="#" alt="주캐릭터 2">
                <div class="slot-overlay"><span>주캐릭터 2</span></div>
                <input type="file" id="upload-main-2" accept="image/*" class="hide-input" onchange="previewImg(this, 'img-main-2')">
            </div>
            <div class="image-slot profile-char center-circle">
                <img id="img-profile" src="#" alt="프로필">
                <div class="slot-overlay"><span style="border-radius: 50%;">메인 프로필</span></div>
                <input type="file" id="upload-profile" accept="image/*" class="hide-input" onchange="previewImg(this, 'img-profile')">
            </div>
            <div class="image-slot favorite-char-1">
                <img id="img-fav-1" src="#" alt="애정캐릭터 1">
                <div class="slot-overlay"><span>애정캐릭터 1</span></div>
                <input type="file" id="upload-fav-1" accept="image/*" class="hide-input" onchange="previewImg(this, 'img-fav-1')">
            </div>
            <div class="image-slot favorite-char-2">
                <img id="img-fav-2" src="#" alt="애정캐릭터 2">
                <div class="slot-overlay"><span>애정캐릭터 2</span></div>
                <input type="file" id="upload-fav-2" accept="image/*" class="hide-input" onchange="previewImg(this, 'img-fav-2')">
            </div>

            <div class="input-wrapper pos-ingame-mode">
                <input type="text" class="transparent-input" placeholder="일반 / 랭크 / 코발트 / 내전">
                <div class="capture-text-mirror"></div>
            </div>
            <div class="input-wrapper pos-ingame-name">
                <input type="text" class="transparent-input" placeholder="인게임 닉네임">
                <div class="capture-text-mirror"></div>
            </div>
            <div class="input-wrapper pos-ingame-discord">
                <input type="text" class="transparent-input" placeholder="듣기 / 말하기 / 전부 / 사용X">
                <div class="capture-text-mirror"></div>
            </div>
            <div class="input-wrapper pos-ingame-tier">
                <input type="text" class="transparent-input" placeholder="현재 티어">
                <div class="capture-text-mirror"></div>
            </div>

            <div class="input-wrapper pos-center-name">
                <input type="text" class="transparent-input" placeholder="트위터 닉네임">
                <div class="capture-text-mirror"></div>
            </div>
            <div class="input-wrapper pos-gender-age">
                <input type="text" class="transparent-input" placeholder="성별 / 나이">
                <div class="capture-text-mirror"></div>
            </div>
            <div class="input-wrapper pos-free-text">
                <textarea class="transparent-input" placeholder="소개글이나 작업 성향 등을 자유롭게 작성하세요."></textarea>
                <div class="capture-text-mirror"></div>
            </div>

            <div class="input-wrapper pos-type-tweet">
                <input type="text" class="transparent-input" placeholder="연성 / 소비 / 흔적 / 일상">
                <div class="capture-text-mirror"></div>
            </div>
            <div class="input-wrapper pos-type-block">
                <input type="text" class="transparent-input" placeholder="블락 / 블언블 / 언팔">
                <div class="capture-text-mirror"></div>
            </div>
            <div class="input-wrapper pos-type-time">
                <input type="text" class="transparent-input" placeholder="주요 접속 시간대">
                <div class="capture-text-mirror"></div>
            </div>

        </div>
    </div>

    <script>
        // 배경 등록 처리
        document.getElementById('bg-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('capture-area').style.backgroundImage = `url('${event.target.result}')`;
                };
                reader.readAsDataURL(file);
            }
        });

        // 캐릭터 이미지 프리뷰 크롭
        function previewImg(input, imgId) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById(imgId);
                    img.src = e.target.result;
                    img.style.display = 'block';
                    input.closest('.image-slot').querySelector('.slot-overlay').style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        }

        document.querySelectorAll('.image-slot').forEach(slot => {
            slot.addEventListener('click', function() {
                this.querySelector('input[type="file"]').click();
            });
        });

        // 인풋창 데이터를 미러링 디브 노드에 동기화
        function syncInputsToMirrors() {
            document.querySelectorAll('.input-wrapper').forEach(wrapper => {
                const input = wrapper.querySelector('.transparent-input');
                const mirror = wrapper.querySelector('.capture-text-mirror');
                if (input && mirror) {
                    mirror.textContent = input.value ? input.value : "";
                }
            });
        }

        // 고해상도 안정적 캡처 다운로드 함수
        function downloadImage() {
            const captureArea = document.getElementById('capture-area');
            const slots = document.querySelectorAll('.image-slot');
            
            // 1. 값 복사 및 클래스 부여 (인풋 숨기고 텍스트 노드 노출)
            syncInputsToMirrors();
            slots.forEach(slot => slot.style.border = 'none');
            captureArea.classList.add('capturing');

            // 2. 브라우저 렌더링 스레드 지연 확보 후 안정적 캡처 진행
            setTimeout(() => {
                html2canvas(captureArea, {
                    scale: 2, 
                    useCORS: true,
                    backgroundColor: null,
                    logging: false
                }).then(canvas => {
                    // 3. 캡처 완료 후 스타일 복구
                    slots.forEach(slot => slot.style.border = '1px dashed rgba(255, 255, 255, 0.25)');
                    captureArea.classList.remove('capturing');

                    const imageUrl = canvas.toDataURL('image/png');
                    const link = document.createElement('a');
                    link.href = imageUrl;
                    link.download = 'eternal_return_card.png';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }).catch(err => {
                    console.error("Render fail:", err);
                    slots.forEach(slot => slot.style.border = '1px dashed rgba(255, 255, 255, 0.25)');
                    captureArea.classList.remove('capturing');
                });
            }, 60);
        }
    </script>
</body>
</html>
