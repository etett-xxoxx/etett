<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ER:BS Profile Generator Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fastly.jsdelivr.net/gh/projectnoonnu/2403-2@1.0/Paperlogy-All.woff2');

        body {
            font-family: 'Paperlogy', sans-serif;
            background: #0f1015;
            color: #e2e4e9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
        }

        header { text-align: center; margin-bottom: 25px; }
        h1 {
            font-size: 26px;
            font-weight: 800;
            margin: 0 0 6px 0;
            background: linear-gradient(90deg, #ff9800, #ff5722);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header p { font-size: 13px; color: #787a86; margin: 0; }

        /* 제어 패널 상단 고정 및 다크 스포티 스타일 */
        .control-panel {
            background: #171821;
            border: 1px solid #2f3142;
            padding: 14px 28px;
            border-radius: 12px;
            display: flex;
            gap: 16px;
            align-items: center;
            margin-bottom: 25px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .control-btn {
            font-family: 'Paperlogy', sans-serif;
            font-weight: 700;
            font-size: 13.5px;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }
        .bg-btn { background: #262838; color: #e2e4e9; border: 1px solid #3b3e56; }
        .bg-btn:hover { background: #33364d; border-color: #ff9800; }
        .download-btn { background: #ff9800; color: #0f1015; }
        .download-btn:hover { background: #ffa726; transform: translateY(-1px); }

        .canvas-container {
            position: relative;
            padding: 12px;
            background: #171821;
            border-radius: 16px;
            border: 1px solid #2f3142;
            box-shadow: 0 16px 40px rgba(0,0,0,0.6);
        }

        #capture-area {
            position: relative;
            width: 800px;
            height: 450px;
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #1a1a24;
            border-radius: 6px;
            overflow: hidden;
        }

        /* 이미지 슬롯 가시성 가이드라인 강화 */
        .image-slot {
            position: absolute;
            background-color: rgba(0, 0, 0, 0.4);
            overflow: hidden;
            cursor: pointer;
            border: 2px dashed rgba(255, 152, 0, 0.4);
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        .image-slot:hover {
            border-color: #ff9800;
            background-color: rgba(255, 152, 0, 0.1);
        }
        .image-slot img { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        .slot-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .slot-overlay span {
            color: #ff9800; font-size: 11px; font-weight: 700;
            background: rgba(15, 16, 21, 0.85); padding: 4px 8px; border-radius: 4px;
            border: 1px solid rgba(255, 152, 0, 0.3);
        }

        .hide-input { display: none; }
        .center-circle { border-radius: 50%; }

        /* 슬롯 좌표 구조 고정 */
        .main-char-1 { top: 22.5%; left: 5.5%; width: 14.5%; height: 33.5%; border-radius: 4px; }
        .main-char-2 { top: 22.5%; left: 22.5%; width: 14.5%; height: 33.5%; border-radius: 4px; }
        .profile-char { top: 24.8%; left: 40.5%; width: 19.2%; height: 34.2%; }
        .favorite-char-1 { top: 62%; left: 63.5%; width: 14.5%; height: 33.5%; border-radius: 4px; }
        .favorite-char-2 { top: 62%; left: 80.5%; width: 14.5%; height: 33.5%; border-radius: 4px; }

        /* =========================================
           [개선] 텍스트 입력 영역 편집 가시성 강화 패치
           ========================================= */
        .input-wrapper {
            position: absolute;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            border: 1px solid transparent;
            border-radius: 4px;
            transition: all 0.15s ease;
        }
        /* 마우스 오버 시 어디를 적어야 하는지 명확하게 박스 포커싱 */
        .input-wrapper:hover {
            background-color: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .transparent-input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            font-family: 'Paperlogy', sans-serif;
            font-weight: 700;
            font-size: 13.5px;
            padding: 4px 6px;
            box-sizing: border-box;
            color: #ffffff;
            text-shadow: -1.5px -1.5px 0 #000, 1.5px -1.5px 0 #000, -1.5px 1.5px 0 #000, 1.5px 1.5px 0 #000, 0px 2px 4px rgba(0,0,0,1);
        }
        /* 인풋창 활성화 시 테두리 강조 */
        .transparent-input:focus {
            background-color: rgba(15, 16, 21, 0.85);
            border-radius: 4px;
            outline: 1px solid #ff9800;
        }
        .transparent-input::placeholder { 
            color: #ffa726; 
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            font-weight: 700; 
            font-size: 11px; 
            opacity: 0.8;
        }

        .capture-text-mirror {
            display: none;
            width: 100%;
            font-family: 'Paperlogy', sans-serif;
            font-weight: 700;
            font-size: 13.5px;
            padding: 4px 6px;
            white-space: pre-wrap;
            word-break: break-all;
            box-sizing: border-box;
            color: #ffffff;
            text-shadow: -1.5px -1.5px 0 #000, 1.5px -1.5px 0 #000, -1.5px 1.5px 0 #000, 1.5px 1.5px 0 #000, 0px 2px 4px rgba(0,0,0,1);
        }

        .capturing .transparent-input { display: none !important; }
        .capturing .capture-text-mirror { display: block !important; }

        /* =========================================
           [개선] 선택 버튼(붉은 박스) 가시성 극대화 최적화
           ========================================= */
        .clickable-box-group {
            position: absolute;
            display: flex;
            gap: 5px;
            align-items: center;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.2);
            padding: 2px;
            border-radius: 50px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }
        .clickable-item {
            font-family: 'Paperlogy', sans-serif;
            font-weight: 700;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            padding: 3px 8px;
            border-radius: 50px;
            transition: all 0.15s ease-in-out;
            user-select: none;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            border: 1px solid transparent;
        }
        /* 비활성 항목 마우스 오버 가이드 */
        .clickable-item:hover {
            color: #fff;
            background-color: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }
        /* [선택됨] 인게임 포인트 감성의 오렌지 하이라이트 배너 스킨 스타일 */
        .clickable-item.active {
            color: #000000;
            background-color: #ff9800;
            font-weight: 800;
            text-shadow: none;
            box-shadow: 0 2px 6px rgba(255, 152, 0, 0.4);
            border-color: #ffb74d;
        }
        
        /* 캡처본에는 불필요한 선택 안 된 버튼들 투명 정리 스위칭 */
        .capturing .clickable-box-group { background: transparent !important; border: none !important; }
        .capturing .clickable-item { display: none !important; }
        .capturing .clickable-item.active { 
            display: block !important; 
            background-color: transparent !important; 
            color: #ffffff !important;
            text-shadow: -1.5px -1.5px 0 #000, 1.5px -1.5px 0 #000, -1.5px 1.5px 0 #000, 1.5px 1.5px 0 #000 !important;
            padding: 2px 0; 
        }

        /* 폰트 및 위치 보정 데이터 레이어 */
        .pos-ingame-mode { top: 67.8%; left: 13.5%; }
        .pos-ingame-name { top: 74.5%; left: 13.5%; width: 16.0%; }
        .pos-ingame-discord { top: 81.0%; left: 13.5%; }
        
        /* 티어 드롭다운 스타일 뱃지 가시성 패치 */
        .pos-ingame-tier { top: 87.5%; left: 13.5%; width: 16.0%; height: 26px; }
        .tier-select-btn {
            width: 100%; height: 100%; text-align: left; background: rgba(255, 152, 0, 0.15); 
            border: 1px solid #ff9800; border-radius: 4px;
            color: #ff9800; font-family: 'Paperlogy', sans-serif; font-weight: 700; font-size: 12.5px;
            cursor: pointer; padding: 2px 8px;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            transition: all 0.2s;
        }
        .tier-select-btn:hover { background: #ff9800; color: #000; text-shadow: none; }

        .pos-center-name { top: 22.0%; left: 43.0%; width: 14.0%; justify-content: center; }
        .pos-center-name .transparent-input, .pos-center-name .capture-text-mirror { text-align: center; font-size: 14.5px; }
        
        .pos-gender-select { top: 61.4%; left: 46.5%; }
        .pos-age-select { top: 64.7%; left: 46.5%; }
        
        .pos-free-text { top: 79.5%; left: 37.5%; width: 25.0%; height: 13.5%; align-items: flex-start; }
        .pos-free-text .transparent-input, .pos-free-text .capture-text-mirror { font-weight: 600; font-size: 12.5px; text-align: left; resize: none; }

        .pos-type-tweet { top: 28.0%; left: 76.5%; }
        .pos-type-block { top: 35.0%; left: 76.5%; }
        .pos-type-time { top: 42.0%; left: 76.5%; width: 18.0%; }
    </style>
</head>
<body>

    <header>
        <h1>ETERNAL RETURN PROFILE GENERATOR</h1>
        <p>박스를 클릭해 옵션을 선택하고 빈칸을 채워 완성도 높은 카드를 바로 엑스포트하세요.</p>
    </header>
    
    <div class="control-panel">
        <label for="bg-upload" class="control-btn bg-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            배경 폼 등록
        </label>
        <input type="file" id="bg-upload" accept="image/*" class="hide-input">
        
        <button class="control-btn download-btn" onclick="downloadImage()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            이미지 다운로드
        </button>
    </div>

    <div class="canvas-container">
        <div id="capture-area">
            
            <div class="image-slot main-char-1">
                <img id="img-main-1" src="#" alt="주캐릭터 1">
                <div class="slot-overlay"><span>주캐릭터 1</span></div>
                <input type="file" id="upload-main-1" accept="image/*" class="hide-input" onchange="previewImg(this, 'img-main-1')">
            </div>
            <div class="image-slot main-char-2">
                <img id="img-main-2" src="#" alt="주캐릭터 2">
                <div class="slot-overlay"><span>주캐릭터 2</span></div>
                <input type="file" id="upload-main-2" accept="image/*" class="hide-input" onchange="previewImg(this, 'img-main-2')">
            </div>
            <div class="image-slot profile-char center-circle">
                <img id="img-profile" src="#" alt="프로필">
                <div class="slot-overlay"><span style="border-radius: 50%;">메인 프로필</span></div>
                <input type="file" id="upload-profile" accept="image/*" class="hide-input" onchange="previewImg(this, 'img-profile')">
            </div>
            <div class="image-slot favorite-char-1">
                <img id="img-fav-1" src="#" alt="애정캐릭터 1">
                <div class="slot-overlay"><span>애정캐릭터 1</span></div>
                <input type="file" id="upload-fav-1" accept="image/*" class="hide-input" onchange="previewImg(this, 'img-fav-1')">
            </div>
            <div class="image-slot favorite-char-2">
                <img id="img-fav-2" src="#" alt="애정캐릭터 2">
                <div class="slot-overlay"><span>애정캐릭터 2</span></div>
                <input type="file" id="upload-fav-2" accept="image/*" class="hide-input" onchange="previewImg(this, 'img-fav-2')">
            </div>

            <div class="clickable-box-group pos-ingame-mode" data-type="single">
                <span class="clickable-item" onclick="toggleSelect(this)">일반</span>
                <span class="clickable-item" onclick="toggleSelect(this)">랭크</span>
                <span class="clickable-item" onclick="toggleSelect(this)">코발트</span>
                <span class="clickable-item" onclick="toggleSelect(this)">내전</span>
            </div>

            <div class="input-wrapper pos-ingame-name">
                <input type="text" class="transparent-input" placeholder="[클릭] 인게임 닉네임 입력">
                <div class="capture-text-mirror"></div>
            </div>

            <div class="clickable-box-group pos-ingame-discord" data-type="single">
                <span class="clickable-item" onclick="toggleSelect(this)">듣기</span>
                <span class="clickable-item" onclick="toggleSelect(this)">말하기</span>
                <span class="clickable-item" onclick="toggleSelect(this)">전부O</span>
                <span class="clickable-item" onclick="toggleSelect(this)">사용X</span>
            </div>

            <div class="input-wrapper pos-ingame-tier">
                <button type="button" class="tier-select-btn" id="tier-display" onclick="rotateTier()">티어 순회 선택</button>
                <div class="capture-text-mirror" id="tier-mirror"></div>
            </div>

            <div class="input-wrapper pos-center-name">
                <input type="text" class="transparent-input" placeholder="[클릭] 트위터 ID">
                <div class="capture-text-mirror"></div>
            </div>

            <div class="clickable-box-group pos-gender-select" data-type="single">
                <span class="clickable-item" onclick="toggleSelect(this)">여성</span>
                <span class="clickable-item" onclick="toggleSelect(this)">남성</span>
                <span class="clickable-item" onclick="toggleSelect(this)">비공개</span>
            </div>
            <div class="clickable-box-group pos-age-select" data-type="single">
                <span class="clickable-item" onclick="toggleSelect(this)">성인</span>
                <span class="clickable-item" onclick="toggleSelect(this)">청소년</span>
                <span class="clickable-item" onclick="toggleSelect(this)">비공개</span>
            </div>

            <div class="input-wrapper pos-free-text">
                <textarea class="transparent-input" placeholder="[클릭] 여기에 자유로운 소개글이나 작업 성향 한마디를 적어주세요."></textarea>
                <div class="capture-text-mirror"></div>
            </div>

            <div class="clickable-box-group pos-type-tweet" data-type="multi">
                <span class="clickable-item" onclick="toggleSelect(this)">연성</span>
                <span class="clickable-item" onclick="toggleSelect(this)">소비</span>
                <span class="clickable-item" onclick="toggleSelect(this)">일상</span>
                <span class="clickable-item" onclick="toggleSelect(this)">기타</span>
            </div>
            <div class="clickable-box-group pos-type-block" data-type="multi">
                <span class="clickable-item" onclick="toggleSelect(this)">블락</span>
                <span class="clickable-item" onclick="toggleSelect(this)">블언블</span>
                <span class="clickable-item" onclick="toggleSelect(this)">FUB FREE</span>
            </div>
            
            <div class="input-wrapper pos-type-time">
                <input type="text" class="transparent-input" placeholder="[클릭] 주요 접속 시간대">
                <div class="capture-text-mirror"></div>
            </div>

        </div>
    </div>

    <script>
        const tiers = ["아이언", "브론즈", "실버", "골드", "플래티넘", "다이아몬드", "메테오라이트", "미스릴", "데미갓", "이터니티"];
        let currentTierIdx = -1;

        function rotateTier() {
            currentTierIdx = (currentTierIdx + 1) % tiers.length;
            const targetTier = tiers[currentTierIdx];
            const btn = document.getElementById('tier-display');
            btn.innerText = targetTier;
            btn.style.background = "#ff9800";
            btn.style.color = "#000000";
            btn.style.textShadow = "none";
        }

        function toggleSelect(element) {
            const group = element.closest('.clickable-box-group');
            const type = group.getAttribute('data-type');

            if (type === 'single') {
                const items = group.querySelectorAll('.clickable-item');
                items.forEach(item => {
                    if(item !== element) item.classList.remove('active');
                });
                element.classList.toggle('active');
            } else {
                element.classList.toggle('active');
            }
        }

        // 배경 비동기 파일 업로드 스트림
        document.getElementById('bg-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('capture-area').style.backgroundImage = `url('${event.target.result}')`;
                };
                reader.readAsDataURL(file);
            }
        });

        // 썸네일 이미지 크롭 매핑 인터페이스
        function previewImg(input, imgId) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById(imgId);
                    img.src = e.target.result;
                    img.style.display = 'block';
                    input.closest('.image-slot').querySelector('.slot-overlay').style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        }

        document.querySelectorAll('.image-slot').forEach(slot => {
            slot.addEventListener('click', function() {
                this.querySelector('input[type="file"]').click();
            });
        });

        function syncInputsToMirrors() {
            document.querySelectorAll('.input-wrapper').forEach(wrapper => {
                const input = wrapper.querySelector('.transparent-input');
                const mirror = wrapper.querySelector('.capture-text-mirror');
                if (input && mirror) {
                    mirror.textContent = input.value ? input.value : "";
                }
            });
            const tierDisplay = document.getElementById('tier-display').innerText;
            document.getElementById('tier-mirror').innerText = (tierDisplay === "티어 순회 선택") ? "" : tierDisplay;
        }

        // 캡처 다운로드 서브루틴 연산 프로세스
        function downloadImage() {
            const captureArea = document.getElementById('capture-area');
            const slots = document.querySelectorAll('.image-slot');
            
            syncInputsToMirrors();
            slots.forEach(slot => slot.style.border = 'none');
            captureArea.classList.add('capturing');

            setTimeout(() => {
                html2canvas(captureArea, {
                    scale: 2, 
                    useCORS: true,
                    backgroundColor: null,
                    logging: false
                }).then(canvas => {
                    slots.forEach(slot => slot.style.border = '2px dashed rgba(255, 152, 0, 0.4)');
                    captureArea.classList.remove('capturing');

                    const imageUrl = canvas.toDataURL('image/png');
                    const link = document.createElement('a');
                    link.href = imageUrl;
                    link.download = 'eternal_return_card.png';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }).catch(err => {
                    console.error("Render fail:", err);
                    slots.forEach(slot => slot.style.border = '2px dashed rgba(255, 152, 0, 0.4)');
                    captureArea.classList.remove('capturing');
                });
            }, 60);
        }
    </script>
</body>
</html>
